name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installiamo Flet moderno e watchdog compatibile
          pip install flet==0.21.2 flet-video requests watchdog==4.0.0

      - name: Accept Android Licenses
        run: |
          # Questo passaggio è fondamentale per sbloccare l'SDK di Android
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          # Usiamo python -m flet per essere sicuri di usare la versione corretta
          python -m flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
